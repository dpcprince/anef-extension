name: Build and Release Extension (fork)

# anef-statut fork: simplified release workflow.
# Triggers ONLY on tag push (vX.Y.Z) or manual dispatch — not on every
# commit to main. The official upstream workflow auto-publishes to the
# Chrome Web Store; this fork doesn't have a CWS listing, so we just
# build a sideload-friendly ZIP and attach it to a GitHub Release.
#
# Usage:
#   git tag v2.7.0-anefstatut.1 -m "Pass 9 preview"
#   git push fork v2.7.0-anefstatut.1
# → Triggers this workflow, ZIP appears on the Releases page.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v2.7.0-anefstatut.2). Leave blank to read from manifest.'
        required: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v$(grep -oP '"version_name":\s*"\K[^"]+' manifest.json || grep -oP '"version":\s*"\K[^"]+' manifest.json)"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Create extension ZIP
        run: |
          mkdir -p build
          cp -r manifest.json build/
          cp -r background build/
          cp -r content build/
          cp -r lib build/
          cp -r popup build/
          cp -r options build/
          cp -r assets build/
          cp -r _locales build/

          # Drop dev-only helper files from the build
          rm -f build/assets/generate-icons.html build/assets/store-screenshots.html build/assets/icon.svg 2>/dev/null || true

          # Strip the `key` field from manifest (Chrome assigns its own ID when sideloading)
          python3 -c "
          import json
          with open('build/manifest.json') as f: m = json.load(f)
          m.pop('key', None)
          with open('build/manifest.json', 'w') as f: json.dump(m, f, indent=2, ensure_ascii=False)
          "

          cd build
          zip -r ../anef-statut-fork-${{ steps.get_version.outputs.VERSION }}.zip .
          cd ..
          ls -lh anef-statut-fork-*.zip

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.get_version.outputs.VERSION }}" \
            "anef-statut-fork-${{ steps.get_version.outputs.VERSION }}.zip" \
            --title "anef-statut fork ${{ steps.get_version.outputs.VERSION }}" \
            --notes "$(cat <<'NOTES'
          ## anef-statut — preview fork

          This is a [fork](https://github.com/dpcprince/anef-extension) of the official [ANEF Status Tracker](https://github.com/Letranger-dev/anef-extension). For day-to-day use, install the **official extension** from the Chrome Web Store — it contributes data to the community pool:

          [![Chrome Web Store](https://img.shields.io/chrome-web-store/v/icnpklneeaiffilemaflccdejefpehek?label=Chrome%20Web%20Store&logo=googlechrome&logoColor=white&color=4285F4)](https://chromewebstore.google.com/detail/anef-status-tracker/icnpklneeaiffilemaflccdejefpehek)

          The fork's value is the **analytics layer** — try the new dashboard directly without installing anything:

          👉 [dpcprince.github.io/anef-extension](https://dpcprince.github.io/anef-extension/)

          ## What's in this ZIP

          The extension fork itself — same source as the official one, plus the popup bug fixes and the "Mon dossier" deep-link pre-fill button. Install only if you want to preview those popup features locally.

          ⚠️ This fork's extension **does not contribute data** to the community pool (the Edge Function key ships only with the official Chrome Web Store build). The dashboard still reads from the same shared pool.

          ## Sideload instructions

          1. Download the ZIP attached below
          2. Unzip to a **permanent folder** (e.g. \`C:\Extensions\anef-statut\\\` on Windows, \`~/Extensions/anef-statut\` on macOS/Linux). If you delete this folder later, the extension stops working.
          3. Open \`chrome://extensions\` (or \`brave://extensions\`)
          4. Enable **Developer mode** (top-right toggle)
          5. Click **Load unpacked**
          6. Select the unzipped folder

          See [README.md](https://github.com/dpcprince/anef-extension/blob/main/README.md) and [FORK_CHANGES.md](https://github.com/dpcprince/anef-extension/blob/main/FORK_CHANGES.md) for what's new.
          NOTES
          )"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
